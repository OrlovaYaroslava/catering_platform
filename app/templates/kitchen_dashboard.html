{% extends "base.html" %}
{% block title %}Панель кухни{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="mb-4">
    <h2 class="fw-800 mb-1">👨‍🍳 Панель кухни</h2>
    <p class="text-muted mb-0">Управление производственным процессом</p>
  </div>

  <div class="row g-3">
    <div class="col-md-4">
      <a href="{{ url_for('main.kitchen_board') }}" class="text-decoration-none">
        <div class="card border-0 shadow-sm rounded-4 p-4 h-100 hover-lift">
          <div class="fs-2 mb-3">📋</div>
          <h5 class="fw-800 mb-1">Доска заказов</h5>
          <p class="text-muted mb-0 small">Kanban-доска: новые, в работе, готовые</p>
        </div>
      </a>
    </div>
    <div class="col-md-4">
      <a href="{{ url_for('main.kitchen_report') }}" class="text-decoration-none">
        <div class="card border-0 shadow-sm rounded-4 p-4 h-100 hover-lift">
          <div class="fs-2 mb-3">📊</div>
          <h5 class="fw-800 mb-1">Отчёт по кухне</h5>
          <p class="text-muted mb-0 small">Статистика выполнения заказов</p>
        </div>
      </a>
    </div>
  </div>
</div>

<style>
.hover-lift { transition: transform .18s ease, box-shadow .18s ease; cursor: pointer; }
.hover-lift:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.10)!important; }
</style>
{% endblock %}
